name: Asgard CI

on:
  push:
      branches: [main]
        pull_request:
            branches: [main]

            jobs:
              lint:
                  name: ESLint
                      runs-on: ubuntu-latest
                          steps:
                                - uses: actions/checkout@v4
                                      - uses: actions/setup-node@v4
                                              with:
                                                        node-version: 20
                                                                  cache: npm
                                                                        - run: npm ci
                                                                              - run: npm run lint

                                                                                smoke-staging:
                                                                                    name: Smoke Tests (staging)
                                                                                        runs-on: ubuntu-latest
                                                                                            needs: lint
                                                                                                if: github.ref == 'refs/heads/main'
                                                                                                    steps:
                                                                                                          - uses: actions/checkout@v4
                                                                                                                - name: Deploy to staging
                                                                                                                        env:
                                                                                                                                  ASGARD_PIN: ${{ secrets.ASGARD_PIN }}
                                                                                                                                          run: |
                                                                                                                                                    python3 -c "
                                                                                                                                                              import base64, json, urllib.request, os
                                                                                                                                                                        with open('workers/asgard.js','rb') as f:
                                                                                                                                                                                      code_b64 = base64.b64encode(f.read()).decode()
                                                                                                                                                                                                pin = os.environ['ASGARD_PIN']
                                                                                                                                                                                                          payload = json.dumps({'worker_name': 'asgard-staging', 'code_b64': code_b64}).encode()
                                                                                                                                                                                                                    req = urllib.request.Request(
                                                                                                                                                                                                                                  'https://asgard-tools.pgallivan.workers.dev/admin/deploy',
                                                                                                                                                                                                                                                data=payload,
                                                                                                                                                                                                                                                              headers={
                                                                                                                                                                                                                                                                                'X-Pin': pin,
                                                                                                                                                                                                                                                                                                  'Cookie': 'asgard_pin=' + pin,
                                                                                                                                                                                                                                                                                                                    'Origin': 'https://asgard.luckdragon.io',
                                                                                                                                                                                                                                                                                                                                      'User-Agent': 'GitHub-Actions',
                                                                                                                                                                                                                                                                                                                                                        'Content-Type': 'application/json'
                                                                                                                                                                                                                                                                                                                                                                      }, method='POST')
                                                                                                                                                                                                                                                                                                                                                                                resp = urllib.request.urlopen(req, timeout=90)
                                                                                                                                                                                                                                                                                                                                                                                          print(resp.read().decode())
                                                                                                                                                                                                                                                                                                                                                                                                    "
                                                                                                                                                                                                                                                                                                                                                                                                          - name: Run smoke tests
                                                                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                                                                            ASGARD_PIN: ${{ secrets.ASGARD_PIN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                    run: bash smoke-test.sh staging
