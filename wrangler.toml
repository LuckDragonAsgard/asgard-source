name = "falkor-agent"
main = "workers/falkor-agent.js"
compatibility_date = "2024-09-23"

[durable_objects]
bindings = [
  { name = "AGENT", class_name = "FalkorAgent" }
]

[[migrations]]
tag = "v1"
new_classes = ["FalkorAgent"]

[vars]
AI_WORKER_URL = "https://asgard-ai.luckdragon.io"

# Secrets (set via: wrangler secret put AGENT_PIN)
# AGENT_PIN — same PIN used by asgard.luckdragon.io
